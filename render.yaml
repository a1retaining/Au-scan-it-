services:
  - type: web
    name: asx-trade-finder-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn asx_trade_finder.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: web
    name: asx-trade-finder-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: asx-trade-finder-api
          property: host
