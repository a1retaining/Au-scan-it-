services:
  - type: web
    name: asx-trade-finder-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn asx_trade_finder.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: web
    name: asx-trade-finder-frontend
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: VITE_API_BASE_URL
        value: https://asx-trade-finder-api.onrender.com
      - key: VITE_AUTO_REFRESH_MS
        value: "60000"
